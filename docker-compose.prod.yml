services:
  # --- Banco de Dados ---
  db:
    image: postgres:15
    container_name: farma_canaa_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - farma_net

  # --- Backend (API Gunicorn) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: farma_canaa_backend_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    depends_on:
      - db
    networks:
      - farma_net

  # --- Frontend (Nginx Proxy) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: farma_canaa_frontend_prod
    restart: always
    ports:
      - "80:80"        # HTTP
      # - "443:443"    # HTTPS (Requer certificados SSL montados em volume)
    depends_on:
      - backend
    networks:
      - farma_net

volumes:
  pgdata_prod:

networks:
  farma_net:
