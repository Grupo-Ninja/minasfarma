services:
  # --- Backend (API Gunicorn) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: farma_canaa_backend_prod
    restart: always
    ports:
      - "6005:8000" # Backend exposto na porta 6005
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    networks:
      - farma_net

  # --- Frontend (Nginx Proxy) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: farma_canaa_frontend_prod
    restart: always
    ports:
      - "3007:80" # Frontend exposto na porta 3007
    depends_on:
      - backend
    networks:
      - farma_net

networks:
  farma_net:
